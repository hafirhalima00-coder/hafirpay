<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="50%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#d946ef"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background circle -->
  <circle cx="100" cy="100" r="90" fill="url(#g1)" opacity="0.1"/>
  <!-- Stylized H and ₿ mark -->
  <g transform="translate(100,100)" filter="url(#glow)">
    <!-- Lightning bolt / payment symbol -->
    <path d="M-30,-45 L10,-5 L-10,-5 L20,45 L-10,5 L10,5 Z" fill="url(#g1)" opacity="0.9"/>
    <!-- Left bar of H -->
    <rect x="-50" y="-40" width="10" height="80" rx="5" fill="url(#g2)"/>
    <!-- Right bar of H -->
    <rect x="40" y="-40" width="10" height="80" rx="5" fill="url(#g2)"/>
    <!-- Crossbar -->
    <rect x="-50" y="-5" width="100" height="10" rx="5" fill="url(#g1)"/>
  </g>
</svg>
